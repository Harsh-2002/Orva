name: install-e2e

# End-to-end install verification across the 6 supported distros.
# Replaces install-test.yml (dryrun-only). Each leg runs install.sh for
# real, brings up orvad, runs the API + CLI smoke flow, then verifies
# uninstall preserves data and --purge wipes it.

on:
  push:
    branches: [main]
    paths:
      - "scripts/install.sh"
      - "scripts/uninstall.sh"
      - "scripts/orva.service"
      - "scripts/orva.openrc"
      - "scripts/entrypoint.sh"
      - "Dockerfile"
      - "test/install/**"
      - ".github/workflows/install-e2e.yml"
  pull_request:
    paths:
      - "scripts/install.sh"
      - "scripts/uninstall.sh"
      - "test/install/**"
      - ".github/workflows/install-e2e.yml"
  workflow_dispatch: {}
  schedule:
    # Weekly run on Sunday 03:00 UTC catches rolling-release breakage (Arch).
    - cron: "0 3 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          # -S warning: skip style/info findings (intentional word-splits).
          shellcheck -s sh -S warning scripts/install.sh scripts/uninstall.sh
          shellcheck -S warning test/install/run-distro.sh \
                                test/install/smoke-flow.sh \
                                test/install/uninstall-flow.sh \
                                test/install/failure-modes.sh \
                                test/install/lib/common.sh

  matrix:
    runs-on: ubuntu-24.04
    needs: shellcheck
    # Two distros are advisory rather than gating:
    #   arch   — rolling release; pacman mirrors drift between runs and
    #            occasionally serve stale signatures or 404 individual
    #            versions, so a transient mirror flake shouldn't block.
    #   alpine — musl + glibc-built nsjail works via gcompat for the
    #            install + smoke flow, but openrc's reinstall edge case
    #            (uninstall then immediate reinstall + service start)
    #            occasionally races on the GH runner. Smoke flow proves
    #            the core install works; the reinstall round-trip is a
    #            nice-to-have we'll harden later.
    continue-on-error: ${{ matrix.distro == 'arch' || matrix.distro == 'alpine321' }}
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu24
          - debian12
          - alpine321
          - rocky9
          - fedora41
          - arch
    steps:
      - uses: actions/checkout@v4

      - name: Install jq + curl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl

      - name: Run install + smoke + uninstall for ${{ matrix.distro }}
        # ORVA_BROWSER_LEG=0 skips agent-browser in CI (no display, would
        # need extra setup). HTTP route spot-checks still run.
        env:
          ORVA_BROWSER_LEG: "0"
        run: |
          bash test/install/run-distro.sh ${{ matrix.distro }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-${{ matrix.distro }}
          path: |
            test/install/logs/${{ matrix.distro }}-*.log
            test/install/results-*.tsv
          retention-days: 14

  # gVisor (runsc) CI leg removed 2026-05-13 after end-to-end testing
  # confirmed Orva does not run under gVisor — nsjail's nested-namespace
  # clone() is rejected by gVisor's sentry on every invocation. See
  # docs/GVISOR.md for the full writeup. No point burning CI minutes
  # re-verifying a known architectural mismatch.

  summary:
    runs-on: ubuntu-24.04
    needs: [matrix]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Build summary
        run: |
          {
            echo "## install-e2e summary"
            echo ""
            echo "| Distro | Result |"
            echo "|---|---|"
            for d in ubuntu24 debian12 alpine321 rocky9 fedora41 arch; do
              if [ -d "artifacts/install-e2e-$d" ]; then
                if grep -q "^$d\tpass" artifacts/install-e2e-$d/results-*.tsv 2>/dev/null; then
                  echo "| $d | ✅ pass |"
                else
                  echo "| $d | ❌ fail |"
                fi
              else
                echo "| $d | ⚠️ no artifact |"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"
