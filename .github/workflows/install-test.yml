name: install-test

on:
  push:
    branches: [main]
    paths:
      - "scripts/install.sh"
      - "scripts/uninstall.sh"
      - "scripts/orva.service"
      - "scripts/orva.openrc"
      - ".github/workflows/install-test.yml"
  pull_request:
    paths:
      - "scripts/install.sh"
      - "scripts/uninstall.sh"
      - ".github/workflows/install-test.yml"
  workflow_dispatch: {}

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck -s sh scripts/install.sh scripts/uninstall.sh

  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:24.04
          - debian:12
          - alpine:3.19
          - rockylinux:9
          - archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install.sh in ${{ matrix.distro }}
        run: |
          docker run --rm \
            --privileged \
            -v "$PWD":/src:ro \
            -e ORVA_INSTALL_DRYRUN=1 \
            ${{ matrix.distro }} \
            sh -c '
              set -e
              # Each distro speaks a different package manager; install.sh
              # handles the dispatch. We only need a POSIX shell + curl
              # here so the script can self-bootstrap.
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update -qq && apt-get install -y --no-install-recommends ca-certificates curl
              elif command -v apk >/dev/null 2>&1; then
                apk add --no-cache ca-certificates curl
              elif command -v dnf >/dev/null 2>&1; then
                dnf install -y --setopt=install_weak_deps=False ca-certificates curl
              elif command -v pacman >/dev/null 2>&1; then
                pacman -Syu --noconfirm ca-certificates curl
              fi
              cp -r /src /tmp/orva
              cd /tmp/orva
              # Dry-run mode: install.sh exercises every distro-detection
              # branch but does NOT download binaries or start a service.
              # That keeps the matrix fast and isolates "did the script
              # parse / branch correctly" from "do binaries run on this
              # kernel" (the latter requires a real bare-metal box).
              sh scripts/install.sh
            '
