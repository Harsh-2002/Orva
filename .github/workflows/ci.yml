name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt every job into Node.js 24 for actions/* steps that still ship as
# Node 20 wrappers (deprecated June 2026). One env var beats bumping
# each action to a v24-native release; the actions themselves still
# work either way, this just silences the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  go:
    name: go ${{ matrix.go }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        go: ["1.25.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: build ui + embed adapters
        # //go:embed all:ui_dist needs the directory populated before
        # vet/test/build. `make embed` does the npm ci + vite build +
        # cp into backend/internal/server/ui_dist.
        run: |
          make embed
          make adapters-embed
        working-directory: ${{ github.workspace }}

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 -race ./...

      - name: go build (binary)
        run: |
          mkdir -p ../build
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.Version=ci-${GITHUB_SHA::7}" \
            -o ../build/orva ./cmd/orva
          ../build/orva --help >/dev/null

  shell:
    name: shell lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dash shellcheck

      - run: dash -n scripts/install.sh

      - run: shellcheck -s sh -S warning scripts/install.sh

      - name: bash scripts
        run: |
          bash -n scripts/entrypoint.sh
          bash -n scripts/build-rootfs.sh
          shellcheck -s bash -S warning scripts/entrypoint.sh scripts/build-rootfs.sh || true

  ui:
    name: ui build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm ci
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: vite build
        working-directory: frontend
        run: npm run build

  docker:
    name: docker image smoke
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build image (no push, no cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64
          tags: orva:ci
