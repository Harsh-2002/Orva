services:
  orva:
    image: ${ORVA_IMAGE:-orva:local}
    runtime: kata-clh
    build:
      context: .
      args:
        VERSION: 0.1.0
      tags:
        - orva:local
    container_name: orva
    restart: unless-stopped

    ports:
      - "3000:8443"

    # nsjail needs a writable, properly-delegated cgroupfs to set memory.max
    # and cpu.max per function. Read-only private cgroup view falls back to
    # rlimit_as (address-space soft cap, no CPU throttling).
    cgroup: host
    # cgroup writes (NSJAIL.<pid>/cgroup.procs) reference PIDs in the host's
    # namespace. Without pid: host, every sandbox spawn fails with
    # "No such file or directory" when nsjail tries to enroll the PID.
    pid: host

    volumes:
      - orva-data:/var/lib/orva
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

    # SYS_ADMIN: nsjail creates user namespaces / mounts / cgroup delegations.
    # NET_ADMIN: egress firewall manager applies nftables rules via `nft`.
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

    # Lifted so nsjail can apply its own per-function seccomp + namespaces.
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - systempaths=unconfined

    # Per-function `network_mode: egress` uses nsjail's --user_net (open()s /dev/net/tun).
    devices:
      - /dev/net/tun:/dev/net/tun

    environment:
      ORVA_DEFAULT_MEMORY_MB: "128"
      ORVA_WRITE_TIMEOUT_SEC: "90"
      ORVA_SESSION_DAYS: "30"
      ORVA_LOG_RETENTION_DAYS: "30"
      ORVA_SECURE_COOKIES: "true"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8443/api/v1/system/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M

volumes:
  # `name:` avoids the project prefix so a pre-existing `orva-data` volume
  # created via bare `docker run` is reused.
  orva-data:
    name: orva-data
    driver: local
